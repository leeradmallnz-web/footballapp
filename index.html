<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Match Day</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Match Day">
<meta name="theme-color" content="#e8c840">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/footballapp/sw.js');
    });
  }
</script>
<style>
  :root {
    --grass: #2d7a3a;
    --grass-dark: #236130;
    --grass-stripe: #265e30;
    --line: rgba(255,255,255,0.85);
    --black: #0d0d0d;
    --white: #f5f5f0;
    --accent: #e8c840;
    --red: #e84040;
    --panel: #111111;
    --panel2: #1a1a1a;
    --border: rgba(255,255,255,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0a0a0a;
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .tab-bar {
    display: flex;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }

  .tab {
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .view { display: none; }
  .view.active { display: block; }

  /* ── PITCH ── */
  .pitch-container {
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .match-controls {
    width: 100%;
    max-width: 420px;
    background: var(--panel2);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .timer-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    color: var(--accent);
    min-width: 80px;
    text-align: center;
  }

  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .btn-green { background: #2ecc71; color: #000; }
  .btn-red { background: var(--red); color: #fff; }
  .btn-yellow { background: var(--accent); color: #000; }
  .btn-ghost {
    background: rgba(255,255,255,0.07);
    color: var(--white);
    border: 1px solid var(--border);
  }
  .btn:active { transform: scale(0.96); }

  .pitch-wrap {
    width: 100%;
    max-width: 380px;
    position: relative;
  }

  .pitch {
    width: 100%;
    aspect-ratio: 0.65;
    background: var(--grass);
    border-radius: 6px;
    position: relative;
    overflow: hidden;
    border: 3px solid rgba(255,255,255,0.15);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  /* Grass stripes */
  .pitch::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 36px,
      rgba(0,0,0,0.07) 36px,
      rgba(0,0,0,0.07) 72px
    );
  }

  /* Pitch markings SVG overlay */
  .pitch-lines {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .pitch-drop-zone {
    position: absolute;
    inset: 0;
  }

  /* Player slots on pitch */
  .player-slot {
    position: absolute;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    z-index: 10;
    -webkit-tap-highlight-color: transparent;
  }

  .player-dot {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--black);
    border: 2.5px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.2px;
    text-align: center;
    line-height: 1.1;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }

  .player-slot.filled .player-dot {
    background: var(--accent);
    color: #000;
    border-color: #fff;
  }

  .player-slot.playing .player-dot {
    background: #2ecc71;
    color: #000;
    border-color: #fff;
    animation: pulse-green 2s infinite;
  }

  @keyframes pulse-green {
    0%, 100% { box-shadow: 0 0 0 0 rgba(46,204,113,0.5); }
    50% { box-shadow: 0 0 0 6px rgba(46,204,113,0); }
  }

  .player-label {
    background: rgba(0,0,0,0.75);
    color: #fff;
    font-size: 9px;
    font-weight: 600;
    padding: 2px 5px;
    border-radius: 4px;
    white-space: nowrap;
    max-width: 60px;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: center;
    letter-spacing: 0.2px;
  }

  /* ── PLAYERS LIST ── */
  .list-container {
    padding: 16px;
    max-width: 520px;
    margin: 0 auto;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1.5px;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .add-player-form {
    background: var(--panel2);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 16px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .add-player-form input, .add-player-form select {
    flex: 1;
    min-width: 120px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--white);
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
  }
  .add-player-form input::placeholder { color: rgba(255,255,255,0.3); }
  .add-player-form input:focus, .add-player-form select:focus {
    border-color: var(--accent);
  }
  .add-player-form select option { background: #1a1a1a; }

  .player-card {
    background: var(--panel2);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid var(--border);
    transition: border-color 0.2s;
  }

  .player-card.on-field {
    border-color: rgba(46,204,113,0.4);
  }

  .player-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--accent);
    min-width: 28px;
    text-align: center;
  }

  .player-info { flex: 1; }

  .player-name {
    font-weight: 600;
    font-size: 15px;
  }

  .player-pos-label {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    margin-top: 2px;
  }

  .player-minutes {
    text-align: right;
  }

  .mins-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--white);
  }

  .mins-label {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .on-badge {
    background: #2ecc71;
    color: #000;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 20px;
    letter-spacing: 0.3px;
  }

  .delete-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.2);
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    transition: color 0.15s;
  }
  .delete-btn:hover { color: var(--red); }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--panel);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 32px;
    width: 100%;
    max-width: 480px;
    max-height: 80vh;
    overflow-y: auto;
    border-top: 1px solid var(--border);
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1.5px;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .position-label {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    margin-top: 14px;
  }

  .player-pick-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .pick-item {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: all 0.15s;
  }

  .pick-item:hover, .pick-item:active {
    background: rgba(232,200,64,0.12);
    border-color: var(--accent);
  }

  .pick-item .pick-name { font-weight: 600; font-size: 14px; }
  .pick-item .pick-pos { font-size: 12px; color: rgba(255,255,255,0.4); }

  .pick-mins {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    color: rgba(255,255,255,0.5);
  }

  .remove-option {
    background: rgba(232,64,64,0.1);
    border-color: rgba(232,64,64,0.3);
    color: var(--red);
  }

  .formation-select {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--white);
    padding: 8px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    outline: none;
    cursor: pointer;
  }
  .formation-select option { background: #1a1a1a; }

  /* ── STATS ── */
  .stats-container {
    padding: 16px;
    max-width: 520px;
    margin: 0 auto;
  }

  .stats-card {
    background: var(--panel2);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid var(--border);
  }

  .rank-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    color: rgba(255,255,255,0.2);
    min-width: 28px;
    text-align: center;
  }

  .stats-bar-wrap {
    flex: 1;
  }

  .stats-bar-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
  }

  .stats-bar {
    height: 5px;
    background: rgba(255,255,255,0.08);
    border-radius: 10px;
    overflow: hidden;
  }

  .stats-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 10px;
    transition: width 0.6s ease;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: rgba(255,255,255,0.25);
    font-size: 14px;
  }

  .empty-state span {
    display: block;
    font-size: 40px;
    margin-bottom: 12px;
  }

  /* ── PENALTIES ── */
  .pen-container {
    padding: 16px;
    max-width: 520px;
    margin: 0 auto;
  }

  .session-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .session-label {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  .pen-player-card {
    background: var(--panel2);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
  }

  .pen-player-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .pen-score-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    min-width: 40px;
    text-align: center;
  }

  .pen-score-badge.positive { color: #2ecc71; }
  .pen-score-badge.zero { color: rgba(255,255,255,0.3); }
  .pen-score-badge.negative { color: var(--red); }

  .pen-player-name {
    flex: 1;
    font-weight: 600;
    font-size: 15px;
  }

  .pen-player-pos {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
  }

  .pen-history-dots {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .pen-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
  }

  .pen-dot.goal { background: #2ecc71; color: #000; }
  .pen-dot.saved { background: var(--accent); color: #000; }
  .pen-dot.miss { background: var(--red); color: #fff; }

  .pen-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }

  .pen-btn {
    padding: 10px 6px;
    border-radius: 10px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    line-height: 1.2;
  }

  .pen-btn:active { transform: scale(0.95); }

  .pen-btn-goal { background: #2ecc71; color: #000; }
  .pen-btn-saved { background: var(--accent); color: #000; }
  .pen-btn-miss { background: var(--red); color: #fff; }

  .pen-btn-pts {
    font-size: 10px;
    opacity: 0.7;
    font-weight: 500;
  }

  .pen-btn-undo {
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.5);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
  }

  .pen-session-bar {
    background: var(--panel2);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 1px solid var(--border);
  }

  .session-stat {
    text-align: center;
  }

  .session-stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
  }

  .session-stat-lbl {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .leaderboard-card {
    background: var(--panel2);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid var(--border);
  }

  .ldr-rank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: rgba(255,255,255,0.2);
    min-width: 28px;
    text-align: center;
  }

  .ldr-rank.gold { color: #ffd700; }
  .ldr-rank.silver { color: #c0c0c0; }
  .ldr-rank.bronze { color: #cd7f32; }

  .ldr-info { flex: 1; }

  .ldr-name { font-weight: 600; font-size: 15px; }

  .ldr-breakdown {
    display: flex;
    gap: 8px;
    margin-top: 4px;
    font-size: 11px;
  }

  .ldr-g { color: #2ecc71; font-weight: 600; }
  .ldr-s { color: var(--accent); font-weight: 600; }
  .ldr-m { color: var(--red); font-weight: 600; }

  .ldr-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
  }

  .ldr-score.positive { color: #2ecc71; }
  .ldr-score.zero { color: rgba(255,255,255,0.3); }
  .ldr-score.negative { color: var(--red); }
</style>
</head>
<body>

<header>
  <h1>⚽ Match Day</h1>
  <select class="formation-select" id="formationSelect" onchange="changeFormation()">
    <option value="4-3-3">4-3-3</option>
    <option value="4-4-2">4-4-2</option>
    <option value="4-2-3-1">4-2-3-1</option>
    <option value="3-5-2">3-5-2</option>
    <option value="5-3-2">5-3-2</option>
    <option value="4-5-1">4-5-1</option>
  </select>
</header>

<div class="tab-bar">
  <div class="tab active" onclick="showTab('pitch')">⚽ Pitch</div>
  <div class="tab" onclick="showTab('squad')">👕 Squad</div>
  <div class="tab" onclick="showTab('stats')">📊 Minutes</div>
  <div class="tab" onclick="showTab('penalties')">🎯 Penalties</div>
</div>

<!-- PITCH TAB -->
<div class="view active" id="view-pitch">
  <div class="pitch-container">

    <div class="match-controls">
      <button class="btn btn-green" onclick="startMatch()" id="startBtn">▶ Start</button>
      <div class="timer-display" id="timerDisplay">00:00</div>
      <button class="btn btn-red" onclick="endMatch()" id="endBtn" disabled>■ End</button>
      <button class="btn btn-ghost" onclick="resetMatch()">↺</button>
    </div>

    <div class="pitch-wrap">
      <div class="pitch">
        <svg class="pitch-lines" viewBox="0 0 200 308" xmlns="http://www.w3.org/2000/svg">
          <!-- Outline -->
          <rect x="4" y="4" width="192" height="300" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
          <!-- Halfway line -->
          <line x1="4" y1="154" x2="196" y2="154" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
          <!-- Centre circle -->
          <circle cx="100" cy="154" r="28" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
          <circle cx="100" cy="154" r="2" fill="rgba(255,255,255,0.55)"/>
          <!-- Top penalty area -->
          <rect x="40" y="4" width="120" height="46" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
          <!-- Top goal area -->
          <rect x="66" y="4" width="68" height="20" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
          <!-- Top goal -->
          <rect x="76" y="0" width="48" height="6" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
          <!-- Top penalty spot -->
          <circle cx="100" cy="34" r="1.5" fill="rgba(255,255,255,0.55)"/>
          <!-- Top penalty arc -->
          <path d="M 68 50 A 32 32 0 0 1 132 50" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
          <!-- Bottom penalty area -->
          <rect x="40" y="258" width="120" height="46" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
          <!-- Bottom goal area -->
          <rect x="66" y="284" width="68" height="20" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
          <!-- Bottom goal -->
          <rect x="76" y="302" width="48" height="6" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
          <!-- Bottom penalty spot -->
          <circle cx="100" cy="274" r="1.5" fill="rgba(255,255,255,0.55)"/>
          <!-- Bottom penalty arc -->
          <path d="M 68 258 A 32 32 0 0 0 132 258" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
          <!-- Corner arcs -->
          <path d="M 4 14 A 10 10 0 0 1 14 4" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1"/>
          <path d="M 186 4 A 10 10 0 0 1 196 14" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1"/>
          <path d="M 4 294 A 10 10 0 0 0 14 304" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1"/>
          <path d="M 196 294 A 10 10 0 0 1 186 304" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1"/>
        </svg>
        <div class="pitch-drop-zone" id="pitchSlots"></div>
      </div>
    </div>

  </div>
</div>

<!-- SQUAD TAB -->
<div class="view" id="view-squad">
  <div class="list-container">
    <div class="section-title">Squad</div>
    <div class="add-player-form">
      <input type="text" id="newPlayerName" placeholder="Player name" maxlength="20">
      <select id="newPlayerPos">
        <option value="GK">GK – Goalkeeper</option>
        <option value="CB">CB – Centre Back</option>
        <option value="LB">LB/LWB – Left Back</option>
        <option value="RB">RB/RWB – Right Back</option>
        <option value="CDM">CDM – Def. Mid</option>
        <option value="CM">CM/CAM – Mid</option>
        <option value="LW">LW/LM – Left Wing</option>
        <option value="RW">RW/RM – Right Wing</option>
        <option value="CF">CF/ST – Striker</option>
      </select>
      <button class="btn btn-yellow" onclick="addPlayer()" style="width:100%">+ Add Player</button>
    </div>
    <div id="squadList"></div>
  </div>
</div>

<!-- STATS TAB -->
<div class="view" id="view-stats">
  <div class="stats-container">
    <div class="section-title">Playing Time</div>
    <div id="statsList"></div>
  </div>
</div>

<!-- PENALTIES TAB -->
<div class="view" id="view-penalties">
  <div class="pen-container">

    <!-- Sub-nav -->
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button class="btn btn-yellow" id="penTabSession" onclick="showPenTab('session')" style="flex:1">📋 This Session</button>
      <button class="btn btn-ghost" id="penTabLeader" onclick="showPenTab('leaderboard')" style="flex:1">🏆 All Time</button>
    </div>

    <!-- SESSION VIEW -->
    <div id="penSessionView">
      <div class="session-header">
        <div class="section-title" style="margin-bottom:0">Training Session</div>
        <div style="display:flex;gap:6px;align-items:center">
          <span class="session-label" id="sessionDateLabel"></span>
          <button class="pen-btn-undo" onclick="newSession()">New Session</button>
        </div>
      </div>

      <div class="pen-session-bar" id="sessionSummary" style="display:none">
        <div class="session-stat">
          <div class="session-stat-val" style="color:#2ecc71" id="sumGoals">0</div>
          <div class="session-stat-lbl">Goals +2</div>
        </div>
        <div class="session-stat">
          <div class="session-stat-val" style="color:var(--accent)" id="sumSaved">0</div>
          <div class="session-stat-lbl">Saved +1</div>
        </div>
        <div class="session-stat">
          <div class="session-stat-val" style="color:var(--red)" id="sumMiss">0</div>
          <div class="session-stat-lbl">Miss -1</div>
        </div>
        <div class="session-stat">
          <div class="session-stat-val" id="sumTotal">0</div>
          <div class="session-stat-lbl">Total Pts</div>
        </div>
      </div>

      <div id="penPlayerList"></div>
    </div>

    <!-- LEADERBOARD VIEW -->
    <div id="penLeaderView" style="display:none">
      <div class="section-title">All-Time Leaderboard</div>
      <div id="penLeaderList"></div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-title" id="modalTitle">Select Player</div>
    <div class="position-label" id="modalPositionLabel"></div>
    <div class="player-pick-list" id="playerPickList"></div>
  </div>
</div>

<script>
// ── STATE ──
let players = JSON.parse(localStorage.getItem('fm_players') || '[]');
let pitchAssignments = JSON.parse(localStorage.getItem('fm_pitch') || '{}'); // slotId -> playerId
let playerMinutes = JSON.parse(localStorage.getItem('fm_minutes') || '{}'); // playerId -> totalMinutes
let playerStartTimes = {}; // playerId -> Date (in-memory, when they started this stint)

let matchRunning = false;
let matchStart = null;
let matchElapsed = 0; // accumulated seconds before current start
let timerInterval = null;
let currentSlot = null;
let nextPlayerId = parseInt(localStorage.getItem('fm_nextId') || '1');

// ── FORMATIONS ──
const FORMATIONS = {
  '4-3-3': [
    {id:'gk', pos:'GK', x:50, y:92},
    {id:'cb1', pos:'CB', x:32, y:78},
    {id:'cb2', pos:'CB', x:68, y:78},
    {id:'lb', pos:'LB', x:12, y:74},
    {id:'rb', pos:'RB', x:88, y:74},
    {id:'cm1', pos:'CM', x:25, y:57},
    {id:'cm2', pos:'CM/CAM', x:50, y:55},
    {id:'cm3', pos:'CM', x:75, y:57},
    {id:'lw', pos:'LW', x:15, y:28},
    {id:'cf', pos:'CF/ST', x:50, y:20},
    {id:'rw', pos:'RW', x:85, y:28},
  ],
  '4-4-2': [
    {id:'gk', pos:'GK', x:50, y:92},
    {id:'cb1', pos:'CB', x:32, y:78},
    {id:'cb2', pos:'CB', x:68, y:78},
    {id:'lb', pos:'LB', x:12, y:74},
    {id:'rb', pos:'RB', x:88, y:74},
    {id:'lm', pos:'LM', x:12, y:52},
    {id:'cm1', pos:'CM', x:37, y:52},
    {id:'cm2', pos:'CM', x:63, y:52},
    {id:'rm', pos:'RM', x:88, y:52},
    {id:'st1', pos:'CF/ST', x:35, y:22},
    {id:'st2', pos:'CF/ST', x:65, y:22},
  ],
  '4-2-3-1': [
    {id:'gk', pos:'GK', x:50, y:92},
    {id:'cb1', pos:'CB', x:32, y:78},
    {id:'cb2', pos:'CB', x:68, y:78},
    {id:'lb', pos:'LB', x:12, y:74},
    {id:'rb', pos:'RB', x:88, y:74},
    {id:'cdm1', pos:'CDM', x:35, y:62},
    {id:'cdm2', pos:'CDM', x:65, y:62},
    {id:'lw', pos:'LW', x:12, y:42},
    {id:'cam', pos:'CAM', x:50, y:38},
    {id:'rw', pos:'RW', x:88, y:42},
    {id:'cf', pos:'CF/ST', x:50, y:20},
  ],
  '3-5-2': [
    {id:'gk', pos:'GK', x:50, y:92},
    {id:'cb1', pos:'CB', x:25, y:78},
    {id:'cb2', pos:'CB', x:50, y:80},
    {id:'cb3', pos:'CB', x:75, y:78},
    {id:'lwb', pos:'LWB', x:8, y:60},
    {id:'cm1', pos:'CM', x:28, y:55},
    {id:'cm2', pos:'CM', x:50, y:52},
    {id:'cm3', pos:'CM', x:72, y:55},
    {id:'rwb', pos:'RWB', x:92, y:60},
    {id:'st1', pos:'CF/ST', x:35, y:22},
    {id:'st2', pos:'CF/ST', x:65, y:22},
  ],
  '5-3-2': [
    {id:'gk', pos:'GK', x:50, y:92},
    {id:'cb1', pos:'CB', x:20, y:80},
    {id:'cb2', pos:'CB', x:40, y:78},
    {id:'cb3', pos:'CB', x:60, y:78},
    {id:'lwb', pos:'LWB', x:8, y:72},
    {id:'rwb', pos:'RWB', x:92, y:72},
    {id:'cm1', pos:'CM', x:25, y:52},
    {id:'cm2', pos:'CM', x:50, y:50},
    {id:'cm3', pos:'CM', x:75, y:52},
    {id:'st1', pos:'CF/ST', x:35, y:22},
    {id:'st2', pos:'CF/ST', x:65, y:22},
  ],
  '4-5-1': [
    {id:'gk', pos:'GK', x:50, y:92},
    {id:'cb1', pos:'CB', x:32, y:78},
    {id:'cb2', pos:'CB', x:68, y:78},
    {id:'lb', pos:'LB', x:12, y:74},
    {id:'rb', pos:'RB', x:88, y:74},
    {id:'lm', pos:'LM', x:8, y:50},
    {id:'cm1', pos:'CM', x:30, y:52},
    {id:'cm2', pos:'CM', x:50, y:50},
    {id:'cm3', pos:'CM', x:70, y:52},
    {id:'rm', pos:'RM', x:92, y:50},
    {id:'cf', pos:'CF/ST', x:50, y:20},
  ],
};

let currentFormation = '4-3-3';

function save() {
  localStorage.setItem('fm_players', JSON.stringify(players));
  localStorage.setItem('fm_pitch', JSON.stringify(pitchAssignments));
  localStorage.setItem('fm_minutes', JSON.stringify(playerMinutes));
  localStorage.setItem('fm_nextId', nextPlayerId.toString());
}

// ── TABS ──
function showTab(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'squad') renderSquad();
  if (name === 'stats') renderStats();
  if (name === 'pitch') renderPitch();
  if (name === 'penalties') { renderPenalties(); showPenTab('session'); }
}

// ── FORMATION ──
function changeFormation() {
  currentFormation = document.getElementById('formationSelect').value;
  // Clear pitch assignments since slot IDs change
  pitchAssignments = {};
  save();
  renderPitch();
}

// ── PITCH ──
function renderPitch() {
  const container = document.getElementById('pitchSlots');
  container.innerHTML = '';
  const slots = FORMATIONS[currentFormation];

  slots.forEach(slot => {
    const playerId = pitchAssignments[slot.id];
    const player = playerId ? players.find(p => p.id == playerId) : null;
    const isPlaying = matchRunning && player;

    const el = document.createElement('div');
    el.className = 'player-slot' + (player ? ' filled' : '') + (isPlaying ? ' playing' : '');
    el.style.left = slot.x + '%';
    el.style.top = slot.y + '%';
    el.onclick = () => openSlotModal(slot);

    const dot = document.createElement('div');
    dot.className = 'player-dot';
    dot.textContent = player ? (player.name.substring(0, 6)) : slot.pos;

    const label = document.createElement('div');
    label.className = 'player-label';
    label.textContent = player ? player.name : slot.pos;

    el.appendChild(dot);
    el.appendChild(label);
    container.appendChild(el);
  });
}

// ── SLOT MODAL ──
function openSlotModal(slot) {
  currentSlot = slot;
  const modal = document.getElementById('modal');
  const overlay = document.getElementById('modalOverlay');
  document.getElementById('modalTitle').textContent = slot.pos + ' Position';
  document.getElementById('modalPositionLabel').textContent = 'Choose a player for this slot';

  const list = document.getElementById('playerPickList');
  list.innerHTML = '';

  const assignedHere = pitchAssignments[slot.id];

  // Remove option if someone is here
  if (assignedHere) {
    const removeItem = document.createElement('div');
    removeItem.className = 'pick-item remove-option';
    removeItem.innerHTML = `<span class="pick-name">Remove player</span>`;
    removeItem.onclick = () => { removeFromSlot(slot.id); closeModalDirect(); };
    list.appendChild(removeItem);
  }

  const onField = new Set(Object.values(pitchAssignments));

  players.forEach(p => {
    if (onField.has(p.id) && p.id !== assignedHere) return; // skip players on another slot

    const item = document.createElement('div');
    item.className = 'pick-item';
    item.innerHTML = `
      <div>
        <div class="pick-name">${p.name}</div>
        <div class="pick-pos">${p.position}</div>
      </div>
      <div class="pick-mins">${formatMins(playerMinutes[p.id] || 0)}'</div>
    `;
    item.onclick = () => { assignToSlot(slot.id, p.id); closeModalDirect(); };
    list.appendChild(item);
  });

  if (players.length === 0) {
    list.innerHTML = '<div class="empty-state"><span>👕</span>Add players in the Squad tab first</div>';
  }

  overlay.classList.add('open');
}

function assignToSlot(slotId, playerId) {
  // If match running, record start time
  if (matchRunning) {
    playerStartTimes[playerId] = Date.now();
  }
  // If there was someone in this slot, stop their time
  const old = pitchAssignments[slotId];
  if (old && matchRunning) {
    accrueMinutes(old);
    delete playerStartTimes[old];
  }
  pitchAssignments[slotId] = playerId;
  save();
  renderPitch();
}

function removeFromSlot(slotId) {
  const old = pitchAssignments[slotId];
  if (old && matchRunning) {
    accrueMinutes(old);
    delete playerStartTimes[old];
  }
  delete pitchAssignments[slotId];
  save();
  renderPitch();
}

function accrueMinutes(playerId) {
  const start = playerStartTimes[playerId];
  if (!start) return;
  const mins = (Date.now() - start) / 60000;
  playerMinutes[playerId] = (playerMinutes[playerId] || 0) + mins;
  save();
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
}

// ── MATCH TIMER ──
function startMatch() {
  if (matchRunning) return;
  matchRunning = true;
  matchStart = Date.now() - matchElapsed * 1000;
  // Record start times for all on-pitch players
  Object.values(pitchAssignments).forEach(pid => {
    if (!playerStartTimes[pid]) playerStartTimes[pid] = Date.now();
  });
  timerInterval = setInterval(tickTimer, 1000);
  document.getElementById('startBtn').disabled = true;
  document.getElementById('endBtn').disabled = false;
  renderPitch();
}

function endMatch() {
  if (!matchRunning) return;
  matchRunning = false;
  clearInterval(timerInterval);
  matchElapsed = Math.floor((Date.now() - matchStart) / 1000);
  // Accrue all on-pitch players
  Object.values(pitchAssignments).forEach(pid => {
    accrueMinutes(pid);
    delete playerStartTimes[pid];
  });
  document.getElementById('startBtn').disabled = false;
  document.getElementById('endBtn').disabled = true;
  renderPitch();
  save();
}

function resetMatch() {
  if (matchRunning) endMatch();
  matchElapsed = 0;
  playerStartTimes = {};
  document.getElementById('timerDisplay').textContent = '00:00';
  document.getElementById('startBtn').disabled = false;
  document.getElementById('endBtn').disabled = true;
}

function tickTimer() {
  const elapsed = Math.floor((Date.now() - matchStart) / 1000);
  const m = Math.floor(elapsed / 60).toString().padStart(2, '0');
  const s = (elapsed % 60).toString().padStart(2, '0');
  document.getElementById('timerDisplay').textContent = m + ':' + s;
}

function formatMins(mins) {
  return Math.floor(mins);
}

// ── SQUAD ──
function addPlayer() {
  const name = document.getElementById('newPlayerName').value.trim();
  const pos = document.getElementById('newPlayerPos').value;
  if (!name) return;

  players.push({ id: nextPlayerId++, name, position: pos });
  save();
  document.getElementById('newPlayerName').value = '';
  renderSquad();
}

function deletePlayer(id) {
  if (!confirm('Remove this player?')) return;
  // Remove from pitch
  Object.keys(pitchAssignments).forEach(slot => {
    if (pitchAssignments[slot] === id) delete pitchAssignments[slot];
  });
  players = players.filter(p => p.id !== id);
  delete playerMinutes[id];
  delete penAllTime[id];
  penSessions.forEach(s => { delete s.results[id]; });
  savePen();
  save();
  renderSquad();
  renderPitch();
}

function renderSquad() {
  const el = document.getElementById('squadList');
  if (players.length === 0) {
    el.innerHTML = '<div class="empty-state"><span>👕</span>No players yet. Add your squad above!</div>';
    return;
  }
  const onField = new Set(Object.values(pitchAssignments));
  el.innerHTML = players.map((p, i) => {
    const mins = Math.floor(playerMinutes[p.id] || 0);
    const field = onField.has(p.id);
    return `
      <div class="player-card ${field ? 'on-field' : ''}">
        <div class="player-num">${i + 1}</div>
        <div class="player-info">
          <div class="player-name">${p.name} ${field ? '<span class="on-badge">ON</span>' : ''}</div>
          <div class="player-pos-label">${p.position}</div>
        </div>
        <div class="player-minutes">
          <div class="mins-big">${mins}'</div>
          <div class="mins-label">minutes</div>
        </div>
        <button class="delete-btn" onclick="deletePlayer(${p.id})">✕</button>
      </div>
    `;
  }).join('');
}

// ── STATS ──
function renderStats() {
  const el = document.getElementById('statsList');
  if (players.length === 0) {
    el.innerHTML = '<div class="empty-state"><span>📊</span>No data yet. Add players and start a match!</div>';
    return;
  }
  const sorted = [...players].sort((a, b) => (playerMinutes[b.id] || 0) - (playerMinutes[a.id] || 0));
  const maxMins = Math.max(...sorted.map(p => playerMinutes[p.id] || 0), 1);

  el.innerHTML = sorted.map((p, i) => {
    const mins = Math.floor(playerMinutes[p.id] || 0);
    const pct = (mins / maxMins) * 100;
    return `
      <div class="stats-card">
        <div class="rank-num">${i + 1}</div>
        <div class="stats-bar-wrap">
          <div class="stats-bar-label">
            <span style="font-weight:600">${p.name}</span>
            <span style="color:rgba(255,255,255,0.45);font-size:13px">${p.position}</span>
          </div>
          <div class="stats-bar">
            <div class="stats-bar-fill" style="width:${pct}%"></div>
          </div>
        </div>
        <div style="text-align:right;margin-left:10px">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:22px">${mins}'</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.5px">mins</div>
        </div>
      </div>
    `;
  }).join('');
}

// ── PENALTIES ──
// penSessions: array of { date, results: { playerId: [{type:'goal'|'saved'|'miss'}] } }
// penAllTime: { playerId: {goals, saved, misses, points} }
let penSessions = JSON.parse(localStorage.getItem('fm_penSessions') || '[]');
let penAllTime = JSON.parse(localStorage.getItem('fm_penAllTime') || '{}');
let currentSessionIdx = penSessions.length - 1; // -1 means no session yet

function savePen() {
  localStorage.setItem('fm_penSessions', JSON.stringify(penSessions));
  localStorage.setItem('fm_penAllTime', JSON.stringify(penAllTime));
}

function newSession() {
  if (players.length === 0) { alert('Add players to your squad first!'); return; }
  const results = {};
  players.forEach(p => { results[p.id] = []; });
  penSessions.push({ date: new Date().toLocaleDateString(), results });
  currentSessionIdx = penSessions.length - 1;
  savePen();
  renderPenalties();
}

function recordKick(playerId, type) {
  if (currentSessionIdx < 0) return;
  const session = penSessions[currentSessionIdx];
  if (!session.results[playerId]) session.results[playerId] = [];
  session.results[playerId].push(type);

  // update all-time
  if (!penAllTime[playerId]) penAllTime[playerId] = { goals: 0, saved: 0, misses: 0, points: 0 };
  const at = penAllTime[playerId];
  if (type === 'goal')  { at.goals++;  at.points += 2; }
  if (type === 'saved') { at.saved++;  at.points += 1; }
  if (type === 'miss')  { at.misses++; at.points -= 1; }

  savePen();
  renderPenalties();
}

function undoKick(playerId) {
  if (currentSessionIdx < 0) return;
  const session = penSessions[currentSessionIdx];
  const kicks = session.results[playerId];
  if (!kicks || kicks.length === 0) return;
  const last = kicks.pop();

  if (penAllTime[playerId]) {
    const at = penAllTime[playerId];
    if (last === 'goal')  { at.goals--;  at.points -= 2; }
    if (last === 'saved') { at.saved--;  at.points -= 1; }
    if (last === 'miss')  { at.misses++; at.points += 1; }
  }

  savePen();
  renderPenalties();
}

function sessionPoints(kicks) {
  return kicks.reduce((acc, k) => {
    if (k === 'goal') return acc + 2;
    if (k === 'saved') return acc + 1;
    if (k === 'miss') return acc - 1;
    return acc;
  }, 0);
}

function showPenTab(tab) {
  document.getElementById('penSessionView').style.display = tab === 'session' ? 'block' : 'none';
  document.getElementById('penLeaderView').style.display = tab === 'leaderboard' ? 'block' : 'none';
  document.getElementById('penTabSession').className = 'btn ' + (tab === 'session' ? 'btn-yellow' : 'btn-ghost');
  document.getElementById('penTabLeader').className = 'btn ' + (tab === 'leaderboard' ? 'btn-yellow' : 'btn-ghost');
  if (tab === 'leaderboard') renderLeaderboard();
}

function renderPenalties() {
  const listEl = document.getElementById('penPlayerList');
  const summaryEl = document.getElementById('sessionSummary');
  const dateEl = document.getElementById('sessionDateLabel');

  if (players.length === 0) {
    listEl.innerHTML = '<div class="empty-state"><span>🎯</span>Add players in the Squad tab first</div>';
    summaryEl.style.display = 'none';
    return;
  }

  if (currentSessionIdx < 0 || penSessions.length === 0) {
    listEl.innerHTML = `<div class="empty-state"><span>🎯</span>Tap <strong>New Session</strong> to start recording penalty kicks!</div>`;
    summaryEl.style.display = 'none';
    dateEl.textContent = '';
    return;
  }

  const session = penSessions[currentSessionIdx];
  dateEl.textContent = session.date;

  // Summary totals
  let totGoals = 0, totSaved = 0, totMiss = 0, totPts = 0;
  players.forEach(p => {
    const kicks = session.results[p.id] || [];
    kicks.forEach(k => {
      if (k === 'goal')  { totGoals++; totPts += 2; }
      if (k === 'saved') { totSaved++; totPts += 1; }
      if (k === 'miss')  { totMiss++;  totPts -= 1; }
    });
  });
  summaryEl.style.display = 'flex';
  document.getElementById('sumGoals').textContent = totGoals;
  document.getElementById('sumSaved').textContent = totSaved;
  document.getElementById('sumMiss').textContent = totMiss;
  const totalEl = document.getElementById('sumTotal');
  totalEl.textContent = totPts > 0 ? '+' + totPts : totPts;
  totalEl.style.color = totPts > 0 ? '#2ecc71' : totPts < 0 ? 'var(--red)' : 'rgba(255,255,255,0.5)';

  listEl.innerHTML = players.map(p => {
    const kicks = session.results[p.id] || [];
    const pts = sessionPoints(kicks);
    const ptsClass = pts > 0 ? 'positive' : pts < 0 ? 'negative' : 'zero';
    const ptsDisplay = pts > 0 ? '+' + pts : pts;

    const dots = kicks.map(k => {
      const cls = k === 'goal' ? 'goal' : k === 'saved' ? 'saved' : 'miss';
      const icon = k === 'goal' ? '⚽' : k === 'saved' ? '🧤' : '✕';
      return `<div class="pen-dot ${cls}">${icon}</div>`;
    }).join('');

    return `
      <div class="pen-player-card">
        <div class="pen-player-top">
          <div class="pen-score-badge ${ptsClass}">${ptsDisplay}</div>
          <div style="flex:1">
            <div class="pen-player-name">${p.name}</div>
            <div class="pen-player-pos">${p.position} · ${kicks.length} kick${kicks.length !== 1 ? 's' : ''}</div>
          </div>
          ${kicks.length > 0 ? `<button class="pen-btn-undo" onclick="undoKick(${p.id})">↩ Undo</button>` : ''}
        </div>
        ${dots ? `<div class="pen-history-dots">${dots}</div>` : ''}
        <div class="pen-buttons">
          <button class="pen-btn pen-btn-goal" onclick="recordKick(${p.id},'goal')">
            ⚽ Goal
            <span class="pen-btn-pts">+2 pts</span>
          </button>
          <button class="pen-btn pen-btn-saved" onclick="recordKick(${p.id},'saved')">
            🧤 Saved
            <span class="pen-btn-pts">+1 pt</span>
          </button>
          <button class="pen-btn pen-btn-miss" onclick="recordKick(${p.id},'miss')">
            ✕ Miss
            <span class="pen-btn-pts">−1 pt</span>
          </button>
        </div>
      </div>
    `;
  }).join('');
}

function renderLeaderboard() {
  const el = document.getElementById('penLeaderList');
  if (players.length === 0) {
    el.innerHTML = '<div class="empty-state"><span>🏆</span>No data yet</div>';
    return;
  }

  const sorted = [...players]
    .map(p => ({ p, at: penAllTime[p.id] || { goals: 0, saved: 0, misses: 0, points: 0 } }))
    .sort((a, b) => b.at.points - a.at.points);

  const rankLabel = (i) => {
    if (i === 0) return '<span class="ldr-rank gold">🥇</span>';
    if (i === 1) return '<span class="ldr-rank silver">🥈</span>';
    if (i === 2) return '<span class="ldr-rank bronze">🥉</span>';
    return `<span class="ldr-rank">${i + 1}</span>`;
  };

  el.innerHTML = sorted.map(({ p, at }, i) => {
    const pts = at.points;
    const ptsClass = pts > 0 ? 'positive' : pts < 0 ? 'negative' : 'zero';
    const ptsDisplay = pts > 0 ? '+' + pts : pts;
    const total = at.goals + at.saved + at.misses;
    return `
      <div class="leaderboard-card">
        ${rankLabel(i)}
        <div class="ldr-info">
          <div class="ldr-name">${p.name}</div>
          <div class="ldr-breakdown">
            <span class="ldr-g">⚽ ${at.goals}</span>
            <span class="ldr-s">🧤 ${at.saved}</span>
            <span class="ldr-m">✕ ${at.misses}</span>
            <span style="color:rgba(255,255,255,0.25)">${total} kicks</span>
          </div>
        </div>
        <div class="ldr-score ${ptsClass}">${ptsDisplay}</div>
      </div>
    `;
  }).join('');
}

// ── INIT ──
renderPitch();
</script>
</body>
</html>
